<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 412" role="img" aria-label="إهدنا — الصراط المستقيم">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c477"/>
      <stop offset=".45" stop-color="#c89b3c"/>
      <stop offset="1" stop-color="#96701f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2aa18c"/>
      <stop offset="1" stop-color="#15685c"/>
    </linearGradient>
    <radialGradient id="pearl" cx=".35" cy=".3" r="1">
      <stop offset="0" stop-color="#8beee6"/>
      <stop offset=".6" stop-color="#28b5ab"/>
      <stop offset="1" stop-color="#128078"/>
    </radialGradient>
    <radialGradient id="globe" cx=".35" cy=".3" r="1.1">
      <stop offset="0" stop-color="#4173d6"/>
      <stop offset="1" stop-color="#1c3a90"/>
    </radialGradient>
  </defs>

  <!-- عقدة اللانهاية: رحلة الهداية الممتدة بلا انقطاع -->
  <path d="M220,196
           C168,118 64,118 64,196
           C64,274 168,274 220,196
           C272,118 376,118 376,196
           C376,274 272,274 220,196"
        fill="none" stroke="url(#teal)" stroke-width="33" stroke-linecap="round"/>
  <path d="M220,196 C168,118 64,118 64,196" fill="none" stroke="#0f5449" stroke-width="33" stroke-linecap="round" opacity=".22"/>

  <!-- الألِفان الذهبيان: عمودا الاستقامة -->
  <g fill="url(#gold)">
    <path d="M170,34 h26 a4,4 0 0 1 4,4 v198 q0,17 -17,25 q-17,-8 -17,-25 v-198 a4,4 0 0 1 4,-4 z"/>
    <path d="M246,66 h26 a4,4 0 0 1 4,4 v198 q0,17 -17,25 q-17,-8 -17,-25 v-198 a4,4 0 0 1 4,-4 z"/>
  </g>
  <!-- نافذة الألِف الثاني -->
  <rect x="250" y="196" width="18" height="30" rx="3.5" fill="#fdf8ee"/>

  <!-- نقطة النون: لؤلؤة الفطرة -->
  <circle cx="103" cy="84" r="15" fill="url(#pearl)"/>
  <circle cx="98.5" cy="78.5" r="4.6" fill="#c4f6f0" opacity=".85"/>

  <!-- الأرض في قلب العقدة: رسالة لكل العالمين -->
  <circle cx="220" cy="196" r="25" fill="url(#globe)" stroke="#c89b3c" stroke-width="2.5"/>
  <g fill="none" stroke="#dcb75f" stroke-width="1.7" opacity=".9">
    <ellipse cx="220" cy="196" rx="25" ry="10"/>
    <ellipse cx="220" cy="196" rx="11.5" ry="23"/>
    <path d="M197,187 h46 M197,205 h46"/>
  </g>
  <path d="M209,184 q6,-5 12,0 q5,4 -2,8 q-9,3 -10,-8 M228,202 q7,-2 6,5 q-1,6 -8,3 q-4,-5 2,-8" fill="#c89b3c" opacity=".95"/>

  <!-- الصراط المستقيم -->
  <text x="220" y="336" text-anchor="middle" font-family="'Scheherazade New','Amiri','Traditional Arabic','Geeza Pro',serif"
        font-size="44" font-weight="700" fill="url(#gold)">الصِّرَاطُ المُستَقِيم</text>
  <text x="220" y="380" text-anchor="middle" font-family="Georgia,'Times New Roman',serif"
        font-size="22" letter-spacing="9" fill="#8a7147">IHDINA</text>
</svg>
